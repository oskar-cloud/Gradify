<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.spotify.com https://*.scdn.co https://*.spotifycdn.com; script-src 'self' https://sdk.scdn.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src * data:; connect-src *; media-src * blob:">
  <title>Gradify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <!-- Dynamic gradient background -->
  <div class="gradient-bg" id="gradientBg"></div>

  <!-- Login screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="url(#lg)" stroke-width="1.5"/><path d="M8 9.5c3-1 6.5-.5 8.5.5M7.5 12.5c2.5-.8 5.5-.5 7.5.5M8 15.5c2-.6 4.5-.4 6.5.5" stroke="url(#lg)" stroke-width="1.5" stroke-linecap="round"/><defs><linearGradient id="lg" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#22c55e"/></linearGradient></defs></svg>
      </div>
      <h1 class="login-title">Gradify</h1>
      <p class="login-subtitle">Your music, beautifully reimagined</p>
      <button class="login-btn" id="loginBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381C8.88 5.7 15.78 5.94 20.16 8.46c.54.3.72 1.02.42 1.56-.3.42-1.02.6-1.5.36v-.3z"/></svg>
        Connect with Spotify
      </button>
      <p class="login-hint">Spotify Premium required for playback</p>
    </div>
  </div>

  <!-- Main app layout -->
  <div class="app-layout" id="appLayout" style="display:none">
    <!-- Custom title bar -->
    <div class="titlebar" id="titlebar">
      <div class="titlebar-drag">
        <span class="titlebar-title">Gradify</span>
      </div>
      <div class="titlebar-controls">
        <button class="titlebar-btn" id="btnMinimize" aria-label="Minimize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" rx=".75" fill="currentColor"/></svg>
        </button>
        <button class="titlebar-btn" id="btnMaximize" aria-label="Maximize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <button class="titlebar-btn titlebar-close" id="btnClose" aria-label="Close">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main content -->
    <main class="main-content" id="mainContent"></main>

    <!-- Player bar -->
    <footer class="player-bar" id="playerBar"></footer>
  </div>

  <script src="icons.js"></script>
  <script src="color-engine.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="components/player.js"></script>
  <script src="components/home.js"></script>
  <script src="components/playlist-view.js"></script>
  <script src="components/library.js"></script>
  <script src="components/search.js"></script>
  <script src="app.js"></script>
</body>
</html>
